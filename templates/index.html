<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Customer Churn Prediction</title>
</head>

<body style="background:black; color:white; font-family:Arial;">

<div class="login">

    <center>
        <h1>Customer Churn Prediction</h1>
        <h4>Author: Ayush Mehta</h4>
    </center>

    <form action="{{ url_for('predict') }}" method="post">

        <center>
            <input type="checkbox" id="SeniorCitizen" name="SeniorCitizen">
            <label for="SeniorCitizen">Senior Citizen</label>

            <input type="checkbox" id="Partner" name="Partner">
            <label for="Partner">Partner</label>

            <input type="checkbox" id="Dependents" name="Dependents">
            <label for="Dependents">Dependents</label>

            <input type="checkbox" id="PaperlessBilling" name="PaperlessBilling">
            <label for="PaperlessBilling">Paperless Billing</label>

            <input type="checkbox" id="PhoneService" name="PhoneService">
            <label for="PhoneService">Phone Service</label>

            <input type="checkbox" id="MultipleLines" name="MultipleLines">
            <label for="MultipleLines">Multiple Lines</label>
        </center>

        <br>

        <center>
            <input type="checkbox" id="OnlineSecurity" name="OnlineSecurity">
            <label for="OnlineSecurity">Online Security</label>

            <input type="checkbox" id="OnlineBackup" name="OnlineBackup">
            <label for="OnlineBackup">Online Backup</label>

            <input type="checkbox" id="DeviceProtection" name="DeviceProtection">
            <label for="DeviceProtection">Device Protection</label>

            <input type="checkbox" id="TechSupport" name="TechSupport">
            <label for="TechSupport">Tech Support</label>

            <input type="checkbox" id="StreamingTV" name="StreamingTV">
            <label for="StreamingTV">Streaming TV</label>

            <input type="checkbox" id="StreamingMovies" name="StreamingMovies">
            <label for="StreamingMovies">Streaming Movies</label>
        </center>

        <br>

        <center>

            <label>Gender:</label>
            <select name="gender">
                <option value="0">Male</option>
                <option value="1">Female</option>
            </select>

            &nbsp;&nbsp;

            <label>Internet:</label>
            <select name="InternetService">
                <option value="0">No</option>
                <option value="1">DSL</option>
                <option value="2">Fiber Optic</option>
            </select>

            &nbsp;&nbsp;

            <label>Contract:</label>
            <select name="Contract">
                <option value="0">Month-to-Month</option>
                <option value="1">One Year</option>
                <option value="2">Two Year</option>
            </select>

            &nbsp;&nbsp;

            <label>Payment:</label>
            <select name="PaymentMethod">
                <option value="0">Bank Transfer</option>
                <option value="1">Credit Card</option>
                <option value="2">Electronic Check</option>
                <option value="3">Mailed Check</option>
            </select>

        </center>

        <br>

        <center>

            <input
                type="number"
                min="0"
                name="MonthlyCharges"
                placeholder="Monthly Charges"
                required
            >

            <input
                type="number"
                min="0"
                name="Tenure"
                placeholder="Tenure (Months)"
                required
            >

        </center>

        <br><br>

        <center>
            <button
                type="submit"
                style="height:35px;width:200px;">
                Predict
            </button>
        </center>

    </form>

    <br><br>

    <center>

        {% if prediction_text %}
            <h2>{{ prediction_text }}</h2>
            <h3>Churn Probability: {{ probability }}</h3>
        {% endif %}

    </center>

</div>

</body>
</html>
